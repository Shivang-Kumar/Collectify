version: '3.8'

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - 3000:3000
    volumes:
      - ./docker/grafana:/var/lib/grafana  # Persist dashboards and configs
    env_file:
      - ./docker/grafana/grafana-config.env  # Load environment variables (if needed)

  redis:
    image: redis
    ports:
      - 6379:6379

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"	

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - 8025:8025  # Web UI
      - 1025:1025  # SMTP server
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - 3200:3200   # Tempo UI
  
  otel-collector:
     image: otel/opentelemetry-collector-contrib:latest
     container_name: otel-collector
     volumes:
       - ./docker/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml
     command: [ "--config=/etc/otel-collector.yaml" ]
     ports:
       - 4317:4317   # OTLP gRPC receiver
     depends_on:
       - tempo
