openapi: 3.0.3
info:
  title: Hogwarts Artifacts Online - User API
  description: API for managing users in Hogwarts Artifacts Online system
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1

paths:
  /users:
    get:
      summary: Get all users
      tags:
        - Users
      responses:
        '200':
          description: Successfully retrieved all users
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Find All Success"
                    data:
                      - id: 1
                        username: "ABC_1"
                        enabled: true
                        roles: "admin"
                        password: "$2a$12$Z1jvGnYejsrdZMugEgRboeKOTRHmfl5N9P8DW5wklHAQ8QbrJPVkS"
                      - id: 2
                        username: "ABC_2"
                        enabled: true
                        roles: "user"
                        password: "$2a$12$WKcYEp2SJ00nh/6N3V9sveXKfc0iXL/Za8SFTKzSPubXcJYNu6yGu"
        '401':
          description: Unauthorized - invalid or expired token
          content:
            application/json:
              examples:
                expiredToken:
                  value:
                    flag: false
                    code: 401
                    message: "The access token provided is expired, revoked , malformed or invalid for other reasons."
                    data: "An error occurred while attempting to decode the Jwt: Signed JWT rejected: Invalid signature"

    post:
      summary: Add a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            examples:
              addUser:
                value:
                  username: "lily"
                  password: "ABCDEfghi123456*()"
                  enabled: true
                  roles: "user"
      responses:
        '200':
          description: User added successfully
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Add Success"
                    data:
                      id: 3
                      username: "lily"
                      enabled: true
                      roles: "user"
                      password: "$2a$12$WS4Eyd9M31GK/lwNz7.fyewkN5axxMLQAQC9f2DsRnCss42PafnZG"
        '400':
          description: Validation failed
          content:
            application/json:
              examples:
                validationError:
                  value:
                    flag: false
                    code: 400
                    message: "Provided arguments are invalid , see data for details."
                    data:
                      password: "password is required"

  /users/{userId}:
    get:
      summary: Get user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Find One Success"
                    data:
                      id: 1
                      username: "ABC_1"
                      enabled: true
                      roles: "admin"
                      password: "$2a$12$Z1jvGnYejsrdZMugEgRboeKOTRHmfl5N9P8DW5wklHAQ8QbrJPVkS"
        '401':
          description: Unauthorized
          content:
            application/json:
              examples:
                unauthorized:
                  value:
                    flag: false
                    code: 401
                    message: "The access token provided is expired, revoked , malformed or invalid for other reasons."
                    data: "An error occurred while attempting to decode the Jwt: Signed JWT rejected: Invalid signature"

    put:
      summary: Update user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            examples:
              updateUser:
                value:
                  username: "John-update"
                  enabled: true
                  roles: "admin user"
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Update Success"
                    data:
                      id: 1
                      username: "John-update"
                      enabled: true
                      roles: "admin user"
                      password: "$2a$12$Z1jvGnYejsrdZMugEgRboeKOTRHmfl5N9P8DW5wklHAQ8QbrJPVkS"
        '401':
          description: Unauthorized - missing login
          content:
            application/json:
              examples:
                unauthorized:
                  value:
                    flag: false
                    code: 401
                    message: "Log in credentials are missing"
                    data: "Full authentication is required to access this resource"

    delete:
      summary: Delete user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Delete Success"
                    data: null
        '404':
          description: User not found
          content:
            application/json:
              examples:
                notFound:
                  value:
                    flag: false
                    code: 404
                    message: "Could not find user with id 1 :("
                    data: null

  /users/{userId}/password:
    patch:
      summary: Change user password
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            examples:
              changePassword:
                value:
                  oldPassword: "oldpass123"
                  newPassword: "newpass123"
                  confirmPassword: "newpass123"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              examples:
                success:
                  value:
                    flag: true
                    code: 200
                    message: "Change Password Success"
                    data: null
        '400':
          description: Invalid password input
          content:
            application/json:
              examples:
                invalid:
                  value:
                    flag: false
                    code: 400
                    message: "Password does not meet requirements"
                    data: null

components:
  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        enabled:
          type: boolean
        roles:
          type: string
        password:
          type: string

    Result:
      type: object
      properties:
        flag:
          type: boolean
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          nullable: true
